<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teruvion - Digital Earth Research Layer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Left Sidebar -->
    <nav id="nav">
      <div id="nav-header">
        <div id="logo">TERUVION</div>
      </div>

      <div id="import-area">
        <input type="text" id="import-input" placeholder="DOI, GitHub URL, or Paper title">
        <button id="import-btn">Import Research</button>
      </div>

      <div id="project-list"></div>

      <div id="nav-footer">
        <span id="status-text">Ready</span>
        <button id="clear-btn" class="btn-ghost">Clear All</button>
      </div>
    </nav>

    <!-- Main Map Area -->
    <main id="main">
      <div id="map"></div>

      <!-- Research Detail Panel -->
      <aside id="research-panel">
        <div id="rp-header">
          <div id="rp-title">Research Object</div>
          <button id="rp-close">×</button>
        </div>
        <div id="rp-body"></div>
      </aside>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
